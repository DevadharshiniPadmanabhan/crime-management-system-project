<!DOCTYPE html>
<html>
<head>
    <title>Add Evidence</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        .top-bar {
            background: #1e3a8a;
            padding: 15px 20px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        .container {
            width: 50%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #163173;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="{{ url_for('view_cases') }}">⬅ Back to Cases</a>
</div>

<div class="container">
    <h2>Add Evidence</h2>
    <form method="POST" action="{{ url_for('add_evidence', case_id=case_id) }}">
        <label for="officer_name">Officer Name:</label>
        <input type="text" name="officer_name" id="officer_name" required>

        <label for="evidence_type">Evidence Type:</label>
        <input type="text" name="evidence_type" id="evidence_type" required>

        <label for="description">Evidence Description:</label>
        <textarea name="description" id="description" rows="5" required></textarea>

        <button type="submit">Add Evidence</button>
    </form>
</div>

</body>
</html>
